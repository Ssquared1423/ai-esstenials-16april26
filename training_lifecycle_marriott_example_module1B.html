<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Lifecycle - Guest Experience Enhancement</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&amp;family=DM+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    * { box-sizing: border-box; }

    .cycle-container {
      position: relative;
      width: 700px;
      height: 700px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stage-node {
      position: absolute;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      z-index: 2;
    }
    .stage-node:hover, .stage-node.active {
      transform: scale(1.15);
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .stage-node .icon-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }
    .stage-node .node-label {
      font-size: 17px;
      font-weight: 700;
      text-align: center;
      line-height: 1.3;
      max-width: 130px;
    }
    .stage-number {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      background: #3d2e1e;
      color: #f5f0e8;
      border: 3px solid #f5f0e8;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      z-index: 3;
    }

    .arrow-ring {
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 3px dashed #c4a882;
      opacity: 0.5;
      animation: spin 40s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .detail-card {
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.4s ease;
      pointer-events: none;
    }
    .detail-card.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .example-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-radius: 24px;
      font-size: 18px;
      font-weight: 700;
      transition: transform 0.2s;
    }
    .example-tag:hover { transform: scale(1.05); }

    @media (max-width: 768px) {
      .cycle-container { width: 320px; height: 320px; }
      .stage-node { width: 68px; height: 68px; }
      .stage-node .node-label { font-size: 7px; }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <!-- Marriott Tech Accelerator Logo -->
  <div style="position: fixed; top: 20px; right: 20px; z-index: 100;">
    <img src="https://media.licdn.com/dms/image/v2/D560BAQG5HWvEKmL2dQ/company-logo_200_200/B56ZbXMuBnHUAI-/0/1747367158280/marriott_tech_accelerator_logo?e=2147483647&v=beta&t=4uVjtOWSZDeWtgAb71OHnpClWt4Q7YYIu671d-hAl7w" 
         alt="Marriott Tech Accelerator" 
         style="width: 180px; height: auto; opacity: 0.95;">
  </div>
  
  <div id="app" class="w-full h-full overflow-auto flex flex-col items-center" style="background:#f5f0e8; font-family:'DM Sans',sans-serif;">
   <header class="text-center pt-12 pb-6 px-4">
    <h1 id="mainTitle" style="font-family:'DM Serif Display',serif; color:#3d2e1e; font-size:64px; font-weight:700;">The AI Lifecycle</h1>
   </header>
   <main class="flex-1 flex flex-col lg:flex-row items-center justify-center gap-8 px-6 pb-10 w-full max-w-7xl"><!-- Circular Diagram -->
    <div class="cycle-container flex-shrink-0">
     <div class="arrow-ring"></div><!-- Center label -->
     <div class="absolute inset-0 flex items-center justify-center z-0">
      <div style="width:170px;height:170px;border-radius:50%;background:rgba(61,46,30,0.06);display:flex;align-items:center;justify-content:center;flex-direction:column;"><i data-lucide="brain" style="width:48px;height:48px;color:#8a7560;stroke-width:2.5;"></i> <span style="font-size:18px;color:#8a7560;font-weight:700;margin-top:8px;letter-spacing:1px;">AI CYCLE</span>
      </div>
     </div><!-- Nodes injected by JS -->
    </div><!-- Detail Panel -->
    <div id="detailCard" class="detail-card w-full max-w-3xl rounded-2xl p-8" style="background:#fff;border:2px solid #e5ddd0;min-height:400px;">
     <div id="detailInner">
      <div class="flex items-center justify-center h-40" style="color:#b5a48e;">
       <p style="font-size:24px;text-align:center;font-weight:600;line-height:1.5;">← Select a stage to see details and live examples</p>
      </div>
     </div>
    </div>
   </main>
  </div>
  <script>
const stages = [
  {
    name: "Problem\nDefinition",
    icon: "target",
    color: "#c0583f",
    bg: "#fdf0ec",
    desc: "Identify the business problem AI will solve. Define success metrics and scope.",
    examples: [
      { text: "Personalize guest stays", icon: "heart" },
      { text: "Increase satisfaction by 20%", icon: "trending-up" },
      { text: "Boost loyalty enrollment 30%", icon: "award" }
    ]
  },
  {
    name: "Data\nCollection",
    icon: "database",
    color: "#b8860b",
    bg: "#fdf8ec",
    desc: "Gather relevant, high-quality datasets. Sources include PMS, Bonvoy, reviews, and IoT sensors.",
    examples: [
      { text: "Guest preference history", icon: "user" },
      { text: "Room service orders", icon: "coffee" },
      { text: "Spa & dining bookings", icon: "utensils" }
    ]
  },
  {
    name: "Data\nPreparation",
    icon: "filter",
    color: "#5a8a3c",
    bg: "#f2f8ec",
    desc: "Clean, transform, and label data. Handle missing values, outliers, and feature engineering.",
    examples: [
      { text: "Categorize preferences", icon: "tag" },
      { text: "Segment guest personas", icon: "users" },
      { text: "Map amenity interests", icon: "map" }
    ]
  },
  {
    name: "Model\nTraining",
    icon: "cpu",
    color: "#3f6d8f",
    bg: "#ecf3f8",
    desc: "Select algorithms, train on data, tune hyperparameters, and validate performance.",
    examples: [
      { text: "Recommendation engine", icon: "sparkles" },
      { text: "Collaborative filtering", icon: "shuffle" },
      { text: "Deep learning embeddings", icon: "cpu" }
    ]
  },
  {
    name: "Evaluation\n& Testing",
    icon: "check-circle",
    color: "#6b5b95",
    bg: "#f3f0f8",
    desc: "Measure accuracy, precision, recall. Test for bias, fairness, and edge cases.",
    examples: [
      { text: "A/B test recommendations", icon: "git-branch" },
      { text: "Measure click-through rates", icon: "mouse-pointer" },
      { text: "Test across guest segments", icon: "layers" }
    ]
  },
  {
    name: "Deployment",
    icon: "rocket",
    color: "#2a7d6e",
    bg: "#edf8f5",
    desc: "Ship the model to production via APIs, mobile apps, or property systems.",
    examples: [
      { text: "Marriott Bonvoy app", icon: "smartphone" },
      { text: "Email personalization", icon: "mail" },
      { text: "In-room tablet suggestions", icon: "tablet" }
    ]
  },
  {
    name: "Monitoring\n& Feedback",
    icon: "activity",
    color: "#a0522d",
    bg: "#f8f0ea",
    desc: "Track model drift, collect user feedback, retrain when performance degrades.",
    examples: [
      { text: "Track engagement rates", icon: "activity" },
      { text: "Collect guest feedback", icon: "message-square" },
      { text: "Measure satisfaction scores", icon: "star" }
    ]
  }
];

const container = document.querySelector('.cycle-container');
const total = stages.length;
const radius = 42; // percentage from center

stages.forEach((stage, i) => {
  const angle = (i / total) * 2 * Math.PI - Math.PI / 2;
  const x = 50 + radius * Math.cos(angle);
  const y = 50 + radius * Math.sin(angle);

  const node = document.createElement('div');
  node.className = 'stage-node';
  node.dataset.index = i;
  node.style.background = stage.bg;
  node.style.border = `3px solid ${stage.color}`;
  node.style.left = `${x}%`;
  node.style.top = `${y}%`;
  node.style.transform = `translate(-50%, -50%)`;
  node.innerHTML = `<div class="icon-wrap">
    <i data-lucide="${stage.icon}" style="width:40px;height:40px;color:${stage.color};stroke-width:2.5;"></i>
    <span class="node-label" style="color:${stage.color};">${stage.name.replace('\n',' ')}</span>
  </div>
  <div class="stage-number">${i + 1}</div>`;
  node.addEventListener('click', () => selectStage(i));
  container.appendChild(node);
});

let activeIndex = -1;

function selectStage(i) {
  const card = document.getElementById('detailCard');
  const inner = document.getElementById('detailInner');
  const s = stages[i];

  document.querySelectorAll('.stage-node').forEach((n, idx) => {
    n.classList.toggle('active', idx === i);
  });

  card.classList.remove('visible');
  setTimeout(() => {
    inner.innerHTML = `
      <div class="flex items-center gap-4 mb-4">
        <div style="width:68px;height:68px;border-radius:50%;background:${s.bg};border:3px solid ${s.color};display:flex;align-items:center;justify-content:center;">
          <i data-lucide="${s.icon}" style="width:36px;height:36px;color:${s.color};stroke-width:2.5;"></i>
        </div>
        <div>
          <div style="font-family:'DM Serif Display',serif;font-size:32px;font-weight:700;color:#3d2e1e;line-height:1.2;">${s.name.replace('\n',' ')}</div>
          <div style="font-size:18px;color:#8a7560;font-weight:700;margin-top:4px;">STAGE ${i+1} OF ${total}</div>
        </div>
      </div>
      <p style="font-size:21px;color:#5a4a38;line-height:1.8;margin-bottom:20px;font-weight:500;">${s.desc}</p>
      <div style="font-size:17px;font-weight:700;color:#8a7560;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.8px;">Marriott Examples</div>
      <div class="flex flex-wrap gap-3">
        ${s.examples.map(e => `<span class="example-tag" style="background:${s.bg};color:${s.color};border:2px solid ${s.color}30;">
          <i data-lucide="${e.icon}" style="width:20px;height:20px;stroke-width:2.5;"></i>${e.text}
        </span>`).join('')}
      </div>
      <div style="margin-top:22px;padding:18px;border-radius:12px;background:#faf7f2;border:2px solid #e8e0d4;">
        <div style="font-size:17px;font-weight:700;color:#8a7560;margin-bottom:8px;">🏨 Real-World Scenario</div>
        <div style="font-size:19px;color:#5a4a38;line-height:1.7;font-weight:500;">${getScenario(i)}</div>
      </div>
    `;
    lucide.createIcons();
    card.classList.add('visible');
  }, 150);
  activeIndex = i;
}

function getScenario(i) {
  const scenarios = [
    "Marriott defines the problem: <b>personalize guest experiences across all touchpoints</b>. Success metric: increase guest satisfaction scores by 20% and boost Bonvoy enrollment by 30%.",
    "Marriott collects <b>guest interaction data from 175M+ Bonvoy members</b>: room preferences, dining choices, spa bookings, amenity usage, and feedback from stays across 8,000+ properties.",
    "Data teams engineer <b>rich guest profiles by combining behavioral patterns</b>: preferred room types, dining times, workout habits, spa treatments, and activity preferences across all properties.",
    "Marriott trains a <b>collaborative filtering recommendation engine</b> using deep learning to predict guest preferences, suggesting personalized room upgrades, dining, spa services, and local experiences.",
    "Guest experience teams run <b>A/B tests with 50,000 members</b> comparing generic vs. personalized recommendations, measuring click-through rates, booking conversions, and post-stay satisfaction.",
    "The recommendation engine deploys to <b>Marriott Bonvoy app, email campaigns, and in-room tablets</b>, suggesting personalized amenities, dining reservations, and activities before and during stays.",
    "Operations tracks <b>engagement metrics, booking rates, and guest satisfaction daily</b>, collecting feedback and retraining models monthly to improve relevance and discover new preference patterns."
  ];
  return scenarios[i];
}

// Auto-select first stage
setTimeout(() => selectStage(0), 600);

// Element SDK
const defaultConfig = {
  main_title: "The AI Lifecycle",
  background_color: "#f5f0e8",
  surface_color: "#ffffff",
  text_color: "#3d2e1e",
  accent_color: "#8a7560",
  secondary_color: "#e5ddd0",
  font_family: "DM Serif Display",
  font_size: 16
};

function applyConfig(config) {
  const app = document.getElementById('app');
  const title = document.getElementById('mainTitle');
  app.style.background = config.background_color || defaultConfig.background_color;
  title.textContent = config.main_title || defaultConfig.main_title;
  title.style.color = config.text_color || defaultConfig.text_color;
  const font = config.font_family || defaultConfig.font_family;
  title.style.fontFamily = `${font}, serif`;
}

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => { applyConfig(config); },
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
      { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
      { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
      { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
      { get: () => config.secondary_color || defaultConfig.secondary_color, set: (v) => { config.secondary_color = v; window.elementSdk.setConfig({ secondary_color: v }); } }
    ],
    borderables: [],
    fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
    fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
  }),
  mapToEditPanelValues: (config) => new Map([
    ["main_title", config.main_title || defaultConfig.main_title]
  ])
});

lucide.createIcons();
</script>

</html>
